{% extends 'master/base.html' %}

{% block content %}

<h1>Task List</h1>
<a href="{% url 'add_task' %}" class="btn btn-success">Add Task</a>

<table class="table table-striped">
  <thead>
    <tr>
      <th>SL</th>
      <th>Title</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    {% for task in task_data %}
    <tr>
      <td >{{forloop.counter}}</td>
      <td >{{task.title}}</td>
      <td >{{task.status}}</td>
      <td>
        <a href = "{% url 'view_task' task.id %}" class = "badge bg-primary" >view</a>
        <a href = "{% url 'update_task' task.id %}" class = "badge bg-success">Edit</a>
        <a href = "{% url 'delete_task' task.id %}" class = "badge bg-primary">Delete</a>
      </td>
    </tr>

    {% endfor %}
  </tbody>
</table>

{% endblock content %}
